name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # 1. Header 左侧：Google Scholar + 语言占比
      - name: Header Left - Scholar & Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: header-left.svg
          base: ""
          plugin_scholar: yes
          plugin_scholar_userid: pD1NOyUAAAAJ
          plugin_scholar_link: yes
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage

      # 2. Header 右侧：3D 活跃曲线 + 个人基础信息
      - name: Header Right - Activity & Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: header-right.svg
          base: header, activity
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      # 3. 循环生成 Repo 卡片
      - name: Repo - Aether
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: repo-aether.svg
          template: repository
          user: OpenRobotLab
          repo: Aether

      - name: Repo - DeepVerse
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: repo-deepverse.svg
          template: repository
          user: SOTAMak1r
          repo: DeepVerse

      - name: Repo - VQ-VLA
