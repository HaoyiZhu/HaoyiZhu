name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # 1. Header 左侧：增加成就插件，让内容变丰富
      - name: Header Left - Scholar & Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: header-left.svg
          base: ""
          plugin_scholar: yes
          plugin_scholar_userid: pD1NOyUAAAAJ
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_achievements: yes # 增加成就奖章，填补垂直空间
          plugin_achievements_display: compact

      # 2. Header 右侧：减小 calendar 的缩放
      - name: Header Right - Activity & Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: header-right.svg
          base: header, activity
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_padding: 0, 0, 0, 0 # 确保右侧没有额外间距

      # 3. 循环生成 Repo 卡片
      - name: Repo - Aether
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: repo-aether.svg
          template: repository
          user: OpenRobotLab
          repo: Aether

      - name: Repo - DeepVerse
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: repo-deepverse.svg
          template: repository
          user: SOTAMak1r
          repo: DeepVerse

      - name: Repo - VQ-VLA
        uses: lowlighter/metrics@latest
