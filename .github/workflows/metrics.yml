name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # 1. 基础统计
      - name: General Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: header-stats.svg
          base: header, activity, community
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_scholar: yes
          plugin_scholar_userid: pD1NOyUAAAAJ
          plugin_scholar_link: yes

      # 2. 循环生成 Repo 卡片 (修正了 28 行起的缩进格式)
      - name: Repo - Aether
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: repo-aether.svg
          template: repository
          user: OpenRobotLab
          repo: Aether

      - name: Repo - DeepVerse
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: repo-deepverse.svg
          template: repository
          user: SOTAMak1r
          repo: DeepVerse

      - name: Repo - VQ-VLA
